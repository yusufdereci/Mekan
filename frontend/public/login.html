<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Mekan</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <a href="index.html" class="auth-logo">📍 Mekan</a>
    <div class="auth-box">
      <h1 class="auth-title">Sign In</h1>
      <p class="auth-subtitle">Log in to your account and explore places</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div id="error-msg" class="auth-error hidden"></div>

      <button id="login-btn" class="btn-auth">Sign In</button>

      <p class="auth-link">
        Don't have an account? <a href="register.html">Sign Up</a>
      </p>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth/login.js"></script>
</body>
</html>
