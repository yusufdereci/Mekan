<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Mekan</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <h1>Admin Login</h1>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button id="login-btn">Login</button>
    </div>
  </div>

  <div id="dashboard" class="hidden">

    <aside class="sidebar">
      <div class="sidebar-logo">📍 Mekan Admin</div>
      <nav>
        <a href="#" class="nav-item active" data-section="all">💬 All Reviews</a>
        <a href="#" class="nav-item" data-section="flagged">⚠️ Flagged</a>
      </nav>
      <div class="sidebar-footer">
        <span id="admin-username"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Total Reviews</span>
          <span class="stat-value" id="stat-approved">—</span>
        </div>
        <div class="stat-card flagged-card">
          <span class="stat-label">⚠️ Flagged</span>
          <span class="stat-value" id="stat-flagged">—</span>
        </div>
      </div>

      <div id="comments-list"></div>
      <div class="pagination" id="pagination"></div>

    </main>
  </div>

  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Edit Review</h2>
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label>Review</label>
        <textarea id="edit-comment" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>Rating</label>
        <select id="edit-rating">
          <option value="1">1 ★</option>
          <option value="2">2 ★★</option>
          <option value="3">3 ★★★</option>
          <option value="4">4 ★★★★</option>
          <option value="5">5 ★★★★★</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="edit-save-btn">Save</button>
        <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
