<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mekan — Home</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/panel.css" />
  <link rel="stylesheet" href="../css/comments.css" />
  <link rel="stylesheet" href="../css/ranking.css" />
  <link rel="stylesheet" href="../css/map.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="home.html" class="nav-logo">📍 Mekan</a>
    <div class="nav-links">
      <a href="home.html" class="nav-link" data-i18n="navMap">🗺️ Map</a>
      <a href="comments_page.html" class="nav-link" data-i18n="navComments">💬 Reviews</a>
      <a href="place-of-month.html" class="nav-link" data-i18n="navPlaceOfMonth">🏆 Place of the Month</a>
      <a href="about.html" class="nav-link" data-i18n="navAbout">ℹ️ About</a>
    </div>
    <div class="nav-right">
      <button id="lang-btn" class="nav-btn">EN</button>
      <div class="nav-user" id="nav-user">
        <span class="nav-username" id="nav-username"></span>
        <div class="nav-dropdown">
          <a href="#" id="nav-favorites">⭐ My Favorites</a>
          <a href="#" id="nav-logout">🚪 Sign Out</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="search-bar">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search places..." />
      <button id="search-btn" data-i18n="searchBtn">Search</button>
    </div>
    <button id="locate-btn">📍 Find Me</button>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <section class="sidebar-section">
        <h2 class="section-title" data-i18n="trending">🔥 Trending Places</h2>
        <div id="trending-list">
          <p class="muted">Loading...</p>
        </div>
      </section>
      <section class="sidebar-section">
        <h2 class="section-title" data-i18n="favorites">⭐ My Favorites</h2>
        <div id="favorites-list">
          <p class="muted">No favorites added yet.</p>
        </div>
      </section>
    </aside>

    <main class="map-container">
      <div id="map"></div>

      <div id="place-panel" class="place-panel hidden">
        <div class="place-panel-header">
          <div>
            <h2 id="place-name">—</h2>
            <p id="place-address" class="muted"></p>
          </div>
          <div class="place-panel-actions">
            <button id="favorite-btn" title="Add to favorites">⭐</button>
            <button id="close-panel-btn">✕</button>
          </div>
        </div>

        <div class="place-stats">
          <div class="stat-item">
            <span class="stat-val" id="stat-satisfaction">—</span>
            <span class="stat-lbl">Satisfaction</span>
          </div>
          <div class="stat-item">
            <span class="stat-val" id="stat-rating">—</span>
            <span class="stat-lbl">Avg Rating</span>
          </div>
          <div class="stat-item">
            <span class="stat-val" id="stat-total">—</span>
            <span class="stat-lbl">Reviews</span>
          </div>
        </div>

        <div class="chart-wrapper">
          <canvas id="satisfaction-chart"></canvas>
          <canvas id="timeline-chart"></canvas>
        </div>

        <div class="comments-section">
          <h3 data-i18n="reviews">Reviews</h3>
          <div id="comments-list"></div>
          <div id="comments-pagination"></div>
        </div>

        <div class="comment-form">
          <h3 data-i18n="addReview">Add Review</h3>
          <div class="star-rating" id="star-rating">
            <span class="star" data-val="1">★</span>
            <span class="star" data-val="2">★</span>
            <span class="star" data-val="3">★</span>
            <span class="star" data-val="4">★</span>
            <span class="star" data-val="5">★</span>
          </div>
          <textarea id="comment-input" rows="3" placeholder="Share your experience..."></textarea>
          <button id="submit-comment-btn">Submit</button>
          <p id="comment-msg" class="comment-msg hidden"></p>
        </div>
      </div>
    </main>

    <aside class="ranking-sidebar">
      <h2 class="section-title" data-i18n="ranking">🏆 Area Rankings</h2>
      <p class="muted" style="font-size:0.8rem;margin-bottom:1rem" data-i18n="rankingSubtitle">Sorted by AI score</p>
      <div id="ranking-list">
        <p class="muted" data-i18n="noRanking">Select a place on the map.</p>
      </div>
    </aside>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/favorites.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../js/map/mapMarkers.js"></script>
  <script src="../js/map/mapSearch.js"></script>
  <script src="../js/map/mapInit.js"></script>
  <script src="../js/panel/panelStats.js"></script>
  <script src="../js/panel/panelRanking.js"></script>
  <script src="../js/panel/panelUI.js"></script>
  <script src="../js/comments/commentsList.js"></script>
  <script src="../js/comments/commentsForm.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/navbar.js"></script>
</body>
</html>
